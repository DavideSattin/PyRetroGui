name: BASIC 80s

cursor: [255, 255, 255]
pointer: [255, 255, 255]

primary:
  background: [0, 0, 128]
  foreground: [255, 255, 255]        # Testo principale
  hover: [0, 0, 128]
  active: [0, 128, 255]              # Selezione stile BASIC
  disabled: [128, 128, 128]
  focus: [255, 255, 0]               # Fosforo giallo

secondary:
  background: [0, 0, 128]
  foreground: [255, 255, 0]          # Keyword BASIC
  hover: [0, 0, 128]
  active: [0, 128, 255]
  disabled: [128, 128, 128]
  focus: [255, 255, 255]

tertiary:
  background: [0, 0, 128]
  foreground: [192, 192, 192]        # Testo neutro
  hover: [0, 0, 128]
  active: [0, 128, 255]
  disabled: [128, 128, 128]
  focus: [255, 255, 255]

success:
  background: [0, 64, 0]
  foreground: [128, 255, 128]
  hover: [0, 80, 0]
  active: [0, 40, 0]
  disabled: [80, 80, 80]
  focus: [200, 255, 200]

info:
  background: [0, 0, 128]
  foreground: [128, 200, 255]
  hover: [0, 0, 160]
  active: [0, 128, 255]
  disabled: [128, 128, 128]
  focus: [200, 220, 255]

warning:
  background: [128, 96, 0]
  foreground: [255, 220, 120]
  hover: [160, 120, 0]
  active: [96, 64, 0]
  disabled: [128, 128, 128]
  focus: [255, 240, 160]

error:
  background: [128, 0, 0]
  foreground: [255, 160, 160]
  hover: [160, 0, 0]
  active: [96, 0, 0]
  disabled: [128, 128, 128]
  focus: [255, 200, 200]